name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the verify job only reads the repo (lint/type-check/build).
permissions:
  contents: read

jobs:
  verify:
    name: lint · type-check · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build (Next.js production)
        run: npm run build
        env:
          # MONGODB_URI is required at request time only; stub it so the
          # build doesn't complain while generating static pages.
          MONGODB_URI: mongodb://ci-placeholder/unused
